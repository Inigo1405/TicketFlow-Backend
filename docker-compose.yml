services:

  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres-users:
    image: postgres:16-alpine
    container_name: postgres-users
    restart: unless-stopped
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  postgres-tickets:
    image: postgres:16-alpine
    container_name: postgres-tickets
    restart: unless-stopped
    environment:
      POSTGRES_DB: tickets_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_tickets_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  postgres-agent:
    image: postgres:16-alpine
    container_name: postgres-agent
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_agent_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ── Services ──────────────────────────────────────────────────────────────
  auth-service:
    container_name: auth-service
    build: ./auth-service
    restart: on-failure
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-users:5432/users_db
      REDIS_URL: redis://redis:6379
    ports:
      - "8001:8001"
    depends_on:
      - postgres-users
      - redis

  ticket-service:
    container_name: ticket-service
    build: ./ticket-service
    restart: on-failure
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-tickets:5432/tickets_db
      AGENT_SERVICE_URL: http://agent-service:8004
    ports:
      - "8002:8002"
    depends_on:
      - postgres-tickets

  agent-service:
    container_name: agent-service
    build: ./agent-service
    restart: on-failure
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-agent:5432/agent_db
      QDRANT_URL: http://qdrant:6333
      TICKET_SERVICE_URL: http://ticket-service:8002
    ports:
      - "8004:8004"
    depends_on:
      - postgres-agent
      - qdrant
      - ticket-service

  api-gateway:
    container_name: api-gateway
    build: ./api-gateway
    restart: on-failure
    env_file: .env
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      TICKET_SERVICE_URL: http://ticket-service:8002
      NOTIFICATION_SERVICE_URL: http://notification-service:8003
      AGENT_SERVICE_URL: http://agent-service:8004
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:8000"   # frontend calls http://localhost:3000/api
    depends_on:
      - auth-service
      - ticket-service
      - agent-service
      - redis

volumes:
  postgres_users_data:
  postgres_tickets_data:
  postgres_agent_data:
  qdrant_data:
